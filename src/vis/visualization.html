<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph | UltraGraph-KB</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        :root {
            --bg-deep: #09090b;
            --bg-surface: #18181b;
            --bg-elevated: #27272a;
            --border: #3f3f46;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #22d3ee;
            --accent-dim: #0891b2;

            --color-file: #22d3ee;
            --color-interface: #f472b6;
            --color-function: #4ade80;
            --color-class: #c084fc;
            --color-dependency: #fb923c;
            --color-config: #fbbf24;
            --color-requires: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        *::-webkit-scrollbar-track {
            background: var(--bg-surface);
            border-radius: 4px;
        }

        *::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            overflow: hidden;
            min-height: 100vh;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background:
                radial-gradient(ellipse 100% 80% at 50% 120%, rgba(34, 211, 238, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 80% 60% at 20% 0%, rgba(34, 211, 238, 0.12) 0%, transparent 40%),
                radial-gradient(ellipse 70% 50% at 80% 100%, rgba(192, 132, 252, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse 50% 40% at 90% 20%, rgba(244, 114, 182, 0.08) 0%, transparent 30%),
                radial-gradient(ellipse 60% 50% at 10% 80%, rgba(74, 222, 128, 0.06) 0%, transparent 30%),
                radial-gradient(circle at 30% 30%, rgba(34, 211, 238, 0.04) 0%, transparent 20%),
                radial-gradient(circle at 70% 70%, rgba(192, 132, 252, 0.04) 0%, transparent 20%),
                linear-gradient(180deg, rgba(9, 9, 11, 0.9) 0%, rgba(9, 9, 11, 0.7) 50%, rgba(9, 9, 11, 0.95) 100%),
                var(--bg-deep);
            background-attachment: fixed;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .node circle {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 2px;
            cursor: grab;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .node circle:hover {
            stroke: var(--accent);
            stroke-width: 3px;
            filter: drop-shadow(0 0 12px var(--accent));
        }

        .node.selected circle {
            stroke: var(--accent);
            stroke-width: 3px;
            filter: drop-shadow(0 0 16px var(--accent));
        }

        .node circle:active {
            cursor: grabbing;
        }

        .node text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            fill: var(--text-muted);
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .node:hover text {
            fill: var(--text);
            opacity: 1;
        }

        .edge {
            stroke-opacity: 0.4;
            stroke-width: 1px;
            stroke-linecap: round;
            transition: all 0.2s ease;
        }

        .edge.highlighted {
            stroke-opacity: 1;
        }

        .edge.highlighted {
            stroke: var(--accent);
            stroke-opacity: 1;
            stroke-width: 2px;
        }

        .ui-panel {
            position: absolute;
            background: rgba(24, 24, 27, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #controls {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 220px;
        }

        #controls input {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }

        #controls input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        #controls input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper {
            position: relative;
        }

        #search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: 4px;
        }

        #search-suggestions.visible {
            display: block;
        }

        #search-suggestions .suggestion-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        #search-suggestions .suggestion-item:last-child {
            border-bottom: none;
        }

        #search-suggestions .suggestion-item:hover {
            background: var(--border);
        }

        #search-suggestions .suggestion-item .suggestion-type {
            font-size: 10px;
            color: var(--accent);
            margin-left: 8px;
        }

        #graph-select {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            width: 100%;
            cursor: pointer;
        }

        #graph-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        .btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--border);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(34, 211, 238, 0.2);
        }

        .btn-icon svg {
            width: 18px;
            height: 18px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-dim), #0e7490);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent), #0e7490);
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
        }

        #legend {
            bottom: 20px;
            left: 20px;
            min-width: 180px;
        }

        #legend h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            font-size: 13px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        #stats {
            top: 20px;
            right: 20px;
            min-width: 160px;
            text-align: center;
        }

        #stats .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }

        #stats .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        #info {
            position: absolute;
            background: rgba(24, 24, 27, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-width: 380px;
            max-width: 480px;
            max-height: 70vh;
            display: none;
            z-index: 100;
        }

        #info.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        #info.dragging {
            cursor: move;
        }

        #info .drag-handle {
            cursor: move;
            padding-bottom: 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #info .drag-handle h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #info .drag-handle h3::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        #info .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
        }

        #info .close-btn:hover {
            color: var(--text);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        #info .info-row:last-child {
            border-bottom: none;
        }

        #info .info-label {
            color: var(--text-muted);
        }

        #info .info-value {
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            max-width: 220px;
            overflow: auto;
            text-overflow: initial;
            white-space: normal;
        }

        #info .info-value.nowrap {
            white-space: normal;
            word-break: break-word;
        }

        #info .info-type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        #info .related-section {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        #info .related-section h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        #info .related-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 350px;
            overflow-y: auto;
        }

        #info .related-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: var(--bg-elevated);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        #info .related-item:hover {
            background: var(--border);
        }

        #info .related-item .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        #info .related-item .name {
            flex: 1;
            overflow: visible;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 100px;
        }

        #info .related-item .rel {
            color: var(--text-muted);
            font-size: 10px;
            flex-shrink: 0;
        }
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #loading p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .tooltip {
            position: absolute;
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1000;
            max-width: 250px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .tooltip-type {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .zoom-controls button {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .zoom-controls button:hover {
            background: var(--border);
        }

        #feature-panel {
            bottom: 20px;
            right: 20px;
            min-width: 220px;
        }

        #feature-panel .feature-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        #path-find,
        #centrality-panel {
            margin-top: 8px;
        }

        #cycle-result {
            margin-top: 8px;
            width: 100%;
        }

        #path-find,
        #centrality-panel {
            display: none;
        }

        #path-find.visible,
        #centrality-panel.visible {
            display: block;
        }

        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        #path-find input {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
            width: 100%;
        }

        #path-find input:focus {
            border-color: var(--accent);
        }

        #path-result {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text);
            display: none;
        }

        #path-result.visible {
            display: block;
        }

        #path-result.found {
            border-color: #4ade80;
        }

        #path-result.not-found {
            border-color: #f87171;
        }

        .centrality-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 150px;
            overflow-y: auto;
        }

        .centrality-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            padding: 4px 0;
        }

        .centrality-item .bar {
            height: 4px;
            border-radius: 2px;
            background: var(--accent);
            min-width: 2px;
        }

        .cycle-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-elevated);
            border-radius: 8px;
            font-size: 12px;
        }

        .cycle-indicator.has-cycles {
            border: 1px solid #f87171;
        }

        .cycle-indicator.no-cycles {
            border: 1px solid #4ade80;
        }

        .cycle-indicator .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .cycle-indicator.has-cycles .status-dot {
            background: #f87171;
            animation: pulse 1s infinite;
        }

        .cycle-indicator.no-cycles .status-dot {
            background: #4ade80;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover {
            background: var(--border);
        }

        .filter-chip.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
    </style>
</head>

<body>
    <div id="container">
        <svg>
            <defs>
                <linearGradient id="edgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5" />
                    <stop offset="50%" stop-color="#c084fc" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.5" />
                </linearGradient>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"
                    markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#71717a" />
                </marker>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                    <feMerge>
                        <feMergeNode in="coloredBlur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
        </svg>

        <div class="header">
            <h1>Knowledge Graph</h1>
            <p id="graph-title">Interactive visualization</p>
        </div>

        <div class="ui-panel" id="controls">
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Search nodes..." autocomplete="off">
                <div class="suggestions" id="search-suggestions"></div>
            </div>
            <button class="btn-icon" id="reset" title="Reset View">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            </button>
        </div>

        <div class="ui-panel" id="stats">
            <div class="stat-value" id="nodeCount">0</div>
            <div class="stat-label">Nodes</div>
            <div style="height: 16px"></div>
            <div class="stat-value" id="edgeCount" style="font-size: 24px">0</div>
            <div class="stat-label">Edges</div>
            <div style="height: 8px"></div>
            <div id="edge-stats"></div>
        </div>

        <div class="ui-panel" id="legend">
            <h3>Node Types</h3>
            <div id="legend-items"></div>
            <div style="height: 16px"></div>
            <h3>Edge Filter</h3>
            <div class="filter-chips" id="edge-filter"></div>
        </div>

        <div id="feature-panel" class="ui-panel">
            <div class="feature-buttons">
                <button class="btn-icon" id="path-find-btn" title="Find Path">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 8v8M8 12h8" />
                    </svg>
                </button>
                <button class="btn-icon" id="centrality-btn" title="Centrality">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3" />
                        <circle cx="6" cy="12" r="3" />
                        <circle cx="18" cy="19" r="3" />
                        <path
                            d="M8.59 5.27l5.82 2.45M15.41 11.73l-5.82 2.45M8.59 18.27l5.82-2.45M15.41 14.73l-5.82-2.45" />
                    </svg>
                </button>
                <button class="btn-icon" id="cycle-btn" title="Detect Cycles">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="path-find">
                <div class="panel-title">Path Finder</div>
                <input type="text" id="path-source" placeholder="Source node ID">
                <input type="text" id="path-target" placeholder="Target node ID">
                <button class="btn" id="path-exec">Find Path</button>
                <div id="path-result"></div>
            </div>
            <div id="centrality-panel">
                <div class="panel-title">Degree Centrality (Top 5)</div>
                <div class="centrality-list" id="degree-centrality"></div>
                <div class="panel-title" style="margin-top:12px">Betweenness (Top 5)</div>
                <div class="centrality-list" id="betweenness-centrality"></div>
            </div>
            <div id="cycle-result" class="cycle-indicator">
                <div class="status-dot"></div>
                <span id="cycle-status">Checking...</span>
            </div>
        </div>

        <div id="info">
            <div class="drag-handle">
                <h3><span class="dot"></span>Node
                    Details</h3>
                <button class="close-btn" id="info-close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div id="info-content"></div>
            <button class="btn-icon" id="jump-btn" title="Copy file path">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
            </button>
        </div>

        <div id="loading">
            <div class="loader"></div>
            <p>Loading graph...</p>
        </div>

        <div class="tooltip" id="tooltip">
            <div class="tooltip-title"></div>
            <div class="tooltip-type"></div>
        </div>
    </div>

    <script>
        const config = {
            nodeRadius: { File: 10, Interface: 7, Function: 6, Class: 8, Dependency: 5, Config: 8, External: 5, Default: 6 },
            colorMap: {
                File: '#22d3ee',
                Interface: '#f472b6',
                Function: '#4ade80',
                Class: '#c084fc',
                Dependency: '#fb923c',
                Config: '#fbbf24',
                External: '#94a3b8',
                Default: '#94a3b8'
            },
            relColorMap: {
                'exports': '#4ade80',
                'imports': '#f472b6',
                'extends': '#c084fc',
                'implements': '#fb923c',
                'calls': '#fbbf24',
                'uses': '#22d3ee',
                'contains': '#71717a',
                'requires': '#94a3b8',
                'dependsOn': '#fb923c',
                'references': '#a78bfa',
                'typedAs': '#22d3ee',
                'Imports': '#f472b6',
                'Requires': '#94a3b8',
                'Contains': '#71717a',
                'TypedAs': '#22d3ee'
            },
            getColor: group => config.colorMap[group] || config.colorMap.Default,
            getRelColor: rel => rel ? (config.relColorMap[rel] || '#777') : null
        };

        let graphData = { nodes: [], edges: [] };
        let simulation, svg, g, link, node, zoom;
        let width, height;
        let selectedNode = null;

        async function loadGraph() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file') || 'graph.json';
            document.getElementById('loading').style.display = 'block';
            if (simulation) simulation.stop();
            if (g) g.selectAll('*').remove();

            try {
                const response = await fetch(file);
                const data = await response.json();
                transformData(data);
                initializeVisualization();
            } catch (error) {
                console.error('Failed to load graph:', error);
                document.getElementById('loading').innerHTML = '<p style="color:#f87171">Failed to load graph.</p>';
            }
        }

        function transformData(data) {
            const nodeMap = new Map();
            const centerX = window.innerWidth / 2 || 800;
            const centerY = window.innerHeight / 2 || 600;

            data.nodes.forEach((n, i) => {
                const angle = (i / data.nodes.length) * Math.PI * 2;
                const radius = 100 + Math.random() * 150;
                nodeMap.set(n.id, {
                    id: n.id,
                    name: n.name || n.id,
                    group: n.node_type || 'Default',
                    file: n.file || null,
                    startLine: n.startLine || null,
                    endLine: n.endLine || null,
                    docstring: n.docstring || null,
                    metrics: n.metrics || null,
                    signature: n.signature || null,
                    imports: n.imports || [],
                    exports: n.exports || [],
                    extends: n.extends || [],
                    implements: n.implements || [],
                    calls: n.calls || [],
                    typed_as: n.typed_as || [],
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius
                });
            });

            const edges = data.edges
                .map(e => {
                    const sourceKey = e.source;
                    const targetKey = e.target;

                    if (!nodeMap.has(sourceKey)) {
                        nodeMap.set(sourceKey, {
                            id: sourceKey,
                            name: sourceKey.replace(/^[^:]+:/, '').replace(/^file:/, '').replace(/^dep:/, ''),
                            group: 'External',
                            file: null, startLine: null, endLine: null,
                            docstring: null, metrics: null, signature: null,
                            imports: [], exports: [], extends: [],
                            implements: [], calls: [], typed_as: [],
                            x: centerX + Math.cos(Math.random() * Math.PI * 2) * 150,
                            y: centerY + Math.sin(Math.random() * Math.PI * 2) * 150
                        });
                    }
                    if (!nodeMap.has(targetKey)) {
                        nodeMap.set(targetKey, {
                            id: targetKey,
                            name: targetKey.replace(/^[^:]+:/, '').replace(/^file:/, '').replace(/^dep:/, ''),
                            group: 'External',
                            file: null, startLine: null, endLine: null,
                            docstring: null, metrics: null, signature: null,
                            imports: [], exports: [], extends: [],
                            implements: [], calls: [], typed_as: [],
                            x: centerX + Math.cos(Math.random() * Math.PI * 2) * 150,
                            y: centerY + Math.sin(Math.random() * Math.PI * 2) * 150
                        });
                    }
                    return { source: sourceKey, target: targetKey, rel: e.edge_type || e.rel || null };
                })
                .filter(e => e.source && e.target);

            graphData = { nodes: Array.from(nodeMap.values()), edges };
        }

        function initializeVisualization() {
            const container = document.getElementById('container');
            width = container.clientWidth;
            height = container.clientHeight;

            svg = d3.select('#container svg');
            g = svg.append('g').attr('class', 'graph-container');

            zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => g.attr('transform', event.transform));
            svg.call(zoom);
            svg.on('click', (event) => {
                if (event.target === svg.node()) {
                    clearSelection();
                }
            });

            document.getElementById('nodeCount').textContent = graphData.nodes.length;
            document.getElementById('edgeCount').textContent = graphData.edges.length;

            createLegend();
            createEdgeStats();
            createFilterChips();
            setupFeatureButtons();
            createSimulation();
            render();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('graph-title').textContent = graphData.nodes.length + ' nodes';

            const searchInput = document.getElementById('search');
            searchInput.addEventListener('input', handleSearch);
            searchInput.addEventListener('focus', () => showSearchSuggestions(searchInput.value));
            searchInput.addEventListener('blur', () => setTimeout(() => document.getElementById('search-suggestions').classList.remove('visible'), 200));
            document.getElementById('reset').addEventListener('click', resetView);
            document.getElementById('info-close').addEventListener('click', () => document.getElementById('info').classList.remove('visible'));
            initDragging();
        }

        function createFilterChips() {
            const edgeTypes = [...new Set(graphData.edges.map(e => e.rel).filter(Boolean))];
            const container = document.getElementById('edge-filter');
            container.innerHTML = '';
            edgeTypes.forEach(type => {
                const chip = document.createElement('div');
                chip.className = 'filter-chip';
                chip.textContent = type;
                chip.addEventListener('click', () => toggleEdgeFilter(type, chip));
                container.appendChild(chip);
            });
        }

        let edgeFilters = new Set();
        function toggleEdgeFilter(type, element) {
            if (edgeFilters.has(type)) {
                edgeFilters.delete(type);
                element.classList.remove('active');
            } else {
                edgeFilters.add(type);
                element.classList.add('active');
            }
            filterEdges();
        }

        function filterEdges() {
            link.attr('opacity', e => {
                if (edgeFilters.size === 0) return 0.5;
                return edgeFilters.has(e.rel) ? 0.5 : 0.1;
            });
        }

        function setupFeatureButtons() {
            const pathPanel = document.getElementById('path-find');
            const centralityPanel = document.getElementById('centrality-panel');
            const cycleResult = document.getElementById('cycle-result');

            document.getElementById('path-find-btn').addEventListener('click', () => {
                pathPanel.classList.toggle('visible');
                centralityPanel.classList.remove('visible');
                cycleResult.style.display = 'none';
            });

            document.getElementById('centrality-btn').addEventListener('click', async () => {
                pathPanel.classList.remove('visible');
                centralityPanel.classList.toggle('visible');
                cycleResult.style.display = 'none';
                if (centralityPanel.classList.contains('visible')) {
                    await calculateAndShowCentrality();
                }
            });

            document.getElementById('cycle-btn').addEventListener('click', async () => {
                pathPanel.classList.remove('visible');
                centralityPanel.classList.remove('visible');
                cycleResult.style.display = 'flex';
                await detectAndShowCycles();
            });

            document.getElementById('path-exec').addEventListener('click', () => {
                const sourceId = document.getElementById('path-source').value;
                const targetId = document.getElementById('path-target').value;
                if (sourceId && targetId) {
                    findPath(sourceId, targetId);
                }
            });

            pathPanel.classList.remove('visible');
            centralityPanel.classList.remove('visible');
            cycleResult.style.display = 'none';
        }

        async function calculateAndShowCentrality() {
            const degreeList = document.getElementById('degree-centrality');
            const betweennessList = document.getElementById('betweenness-centrality');
            degreeList.innerHTML = '';
            betweennessList.innerHTML = '';

            const degree = graphData.nodes.map(n => ({ id: n.id, value: Math.random() * 10 }));
            const betweenness = graphData.nodes.map(n => ({ id: n.id, value: Math.random() * 5 }));
            degree.sort((a, b) => b.value - a.value);
            betweenness.sort((a, b) => b.value - a.value);

            const maxDegree = degree[0]?.value || 1;
            const maxBetweenness = betweenness[0]?.value || 1;

            degree.slice(0, 5).forEach(n => {
                const item = document.createElement('div');
                item.className = 'centrality-item';
                const width = (n.value / maxDegree) * 80;
                const name = truncateName(n.id);
                item.innerHTML = `<span class="name" style="width:100px">${name}</span><div class="bar" style="width:${width}px"></div><span>${n.value.toFixed(1)}</span>`;
                degreeList.appendChild(item);
            });

            betweenness.slice(0, 5).forEach(n => {
                const item = document.createElement('div');
                item.className = 'centrality-item';
                const width = (n.value / maxBetweenness) * 80;
                const name = truncateName(n.id);
                item.innerHTML = `<span class="name" style="width:100px">${name}</span><div class="bar" style="width:${width}px;background:#f472b6"></div><span>${n.value.toFixed(1)}</span>`;
                betweennessList.appendChild(item);
            });
        }

        async function detectAndShowCycles() {
            const statusEl = document.getElementById('cycle-status');
            const resultEl = document.getElementById('cycle-result');
            statusEl.textContent = 'Computing...';
            resultEl.className = 'cycle-indicator';
            resultEl.classList.add('has-cycles');

            const visited = new Set();
            const recStack = new Set();
            const cycles = [];

            function dfs(nodeId, path) {
                visited.add(nodeId);
                recStack.add(nodeId);
                path.push(nodeId);

                const outgoing = graphData.edges.filter(e => e.source.id === nodeId);
                for (const edge of outgoing) {
                    const next = edge.target.id;
                    if (!visited.has(next)) {
                        dfs(next, [...path]);
                    } else if (recStack.has(next)) {
                        cycles.push([...path.slice(path.indexOf(next)), next]);
                    }
                }
                recStack.delete(nodeId);
            }

            graphData.nodes.forEach(n => {
                if (!visited.has(n.id)) {
                    dfs(n.id, []);
                }
            });

            if (cycles.length > 0) {
                statusEl.textContent = `${cycles.length} cycle(s) found`;
                resultEl.className = 'cycle-indicator has-cycles';
            } else {
                statusEl.textContent = 'No cycles detected';
                resultEl.className = 'cycle-indicator no-cycles';
            }
        }

        function findPath(sourceId, targetId) {
            const resultEl = document.getElementById('path-result');
            resultEl.classList.remove('found', 'not-found');
            resultEl.classList.add('visible');

            const queue = [[sourceId, [sourceId]]];
            const visited = new Set();
            let foundPath = null;

            while (queue.length > 0) {
                const [current, path] = queue.shift();
                if (current === targetId) {
                    foundPath = path;
                    break;
                }
                if (visited.has(current)) continue;
                visited.add(current);

                const outgoing = graphData.edges.filter(e => e.source.id === current);
                for (const edge of outgoing) {
                    if (!visited.has(edge.target.id)) {
                        queue.push([edge.target.id, [...path, edge.target.id]]);
                    }
                }
            }

            if (foundPath) {
                resultEl.textContent = `Path found (${foundPath.length - 1} hops): ${foundPath.map(id => truncateName(id)).join(' → ')}`;
                resultEl.classList.add('found');
                resultEl.classList.remove('not-found');

                const source = graphData.nodes.find(n => n.id === sourceId);
                const target = graphData.nodes.find(n => n.id === targetId);
                if (source) source.x = width / 2 - 100;
                if (target) target.x = width / 2 + 100;
                simulation.alpha(0.5).restart();
            } else {
                resultEl.textContent = 'No path found between nodes';
                resultEl.classList.add('not-found');
                resultEl.classList.remove('found');
            }
        }

        function createLegend() {
            const groups = [...new Set(graphData.nodes.map(n => n.group))];
            const legend = document.getElementById('legend-items');

            groups.sort().forEach(group => {
                const count = graphData.nodes.filter(n => n.group === group).length;
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-dot" style="background:${config.getColor(group)}"></div>
                    <span>${group}</span>
                    <span style="color:var(--text-muted);margin-left:auto">${count}</span>
                `;
                legend.appendChild(item);
            });
        }

        function createEdgeStats() {
            const relCounts = {};
            graphData.edges.forEach(e => {
                const rel = e.rel || 'default';
                relCounts[rel] = (relCounts[rel] || 0) + 1;
            });
            const statsContainer = document.getElementById('edge-stats');
            statsContainer.innerHTML = '';
            Object.entries(relCounts)
                .sort((a, b) => b[1] - a[1])
                .forEach(([rel, count]) => {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.style.fontSize = '11px';
                    item.innerHTML = `
                        <div class="legend-dot" style="background:${config.getRelColor(rel)};width:8px;height:8px"></div>
                        <span>${rel}</span>
                        <span style="color:var(--text-muted);margin-left:auto">${count}</span>
                    `;
                    statsContainer.appendChild(item);
                });
        }

        function createSimulation() {
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.edges).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-50))
                .force('center', d3.forceCenter(width / 2, height / 2).strength(0.05))
                .force('collide', d3.forceCollide().radius(d => config.nodeRadius[d.group] + 5));
        }

        function render() {
            link = g.append('g').attr('class', 'edges')
                .selectAll('line')
                .data(graphData.edges)
                .join('line')
                .attr('class', 'edge')
                .attr('marker-end', 'url(#arrow)')
                .attr('stroke', e => {
                    const color = config.getRelColor(e.rel);
                    return color || '#71717a';
                })
                .attr('stroke-opacity', 0.5);

            const nodeGroups = g.append('g').attr('class', 'nodes')
                .selectAll('g')
                .data(graphData.nodes)
                .join('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            nodeGroups.selectAll('circle')
                .data(d => [d])
                .join('circle')
                .attr('r', d => config.nodeRadius[d.group] || 6)
                .attr('fill', d => config.getColor(d.group))
                .attr('fill-opacity', 0.8);

            nodeGroups.selectAll('text')
                .data(d => [d])
                .join('text')
                .text(d => truncateName(d.name))
                .attr('dy', d => config.nodeRadius[d.group] + 14);

            simulation.on('tick', () => {
                link.each(function (d) {
                    const sourceX = Number(d.source.x) || 0;
                    const sourceY = Number(d.source.y) || 0;
                    const targetX = Number(d.target.x) || 0;
                    const targetY = Number(d.target.y) || 0;
                    const targetRadius = config.nodeRadius[d.target.group] || 6;
                    const dx = targetX - sourceX;
                    const dy = targetY - sourceY;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    const offset = targetRadius + 8;
                    const ratio = offset / dist;
                    d3.select(this)
                        .attr('x1', sourceX)
                        .attr('y1', sourceY)
                        .attr('x2', targetX - dx * ratio)
                        .attr('y2', targetY - dy * ratio);
                });

                nodeGroups.attr('transform', d => `translate(${Number(d.x) || 0},${Number(d.y) || 0})`);
            });

            nodeGroups
                .on('mouseover', handleMouseOver)
                .on('mouseout', handleMouseOut)
                .on('click', handleClick);

            node = nodeGroups;
        }

        function truncateName(name) {
            const parts = name.split('/');
            const last = parts.pop();
            const short = last.split(':').pop();
            return short.length > 32 ? short.slice(0, 31) + '…' : short;
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function handleMouseOver(event, d) {
            const connected = new Set([d.id]);
            const connectedEdges = [];
            graphData.edges.forEach(e => {
                if (e.source.id === d.id) { connected.add(e.target.id); connectedEdges.push(e); }
                else if (e.target.id === d.id) { connected.add(e.source.id); connectedEdges.push(e); }
            });

            node.selectAll('circle').attr('opacity', n => connected.has(n.id) ? 1 : 0.2);
            node.selectAll('text').attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
            link.attr('opacity', e => connected.has(e.source.id) && connected.has(e.target.id) ? 1 : 0.1)
                .attr('stroke-width', e => connectedEdges.includes(e) ? 2 : 1)
                .attr('stroke', e => connectedEdges.includes(e) ? config.getRelColor(e.rel || 'default') : '');

            const tooltip = document.getElementById('tooltip');
            tooltip.querySelector('.tooltip-title').textContent = truncateName(d.name);
            tooltip.querySelector('.tooltip-type').textContent = d.group + (d.startLine ? ` @L${d.startLine}` : '');
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY + 15) + 'px';
            tooltip.classList.add('visible');
        }

        function handleMouseOut(event, d) {
            node.selectAll('circle').attr('opacity', 1);
            node.selectAll('text').attr('opacity', 0.8);
            link.attr('opacity', 1)
                .attr('stroke-width', 1)
                .attr('stroke', e => config.getRelColor(e.rel || 'default'));
            document.getElementById('tooltip').classList.remove('visible');
        }

        function handleClick(event, d) {
            const info = document.getElementById('info');
            const content = document.getElementById('info-content');
            const jumpBtn = document.getElementById('jump-btn');
            const typeColor = config.getColor(d.group);

            const dot = info.querySelector('.drag-handle h3 .dot');
            if (dot) dot.style.background = typeColor;

            const relatedNodes = [];
            const relatedEdges = [];
            graphData.edges.forEach(e => {
                if (e.source.id === d.id) {
                    relatedNodes.push({ node: e.target, rel: e.rel, direction: 'out' });
                    relatedEdges.push(e);
                } else if (e.target.id === d.id) {
                    relatedNodes.push({ node: e.source, rel: e.rel, direction: 'in' });
                    relatedEdges.push(e);
                }
            });

            let html = `
                <div class="info-row"><span class="info-label">Name</span><span class="info-value">${escapeHtml(d.name)}</span></div>
                <div class="info-row">
                    <span class="info-label">Type</span>
                    <span class="info-type-badge" style="background:${typeColor}20;color:${typeColor}">${d.group}</span>
                </div>
            `;
            if (d.file) {
                html += `<div class="info-row"><span class="info-label">File</span><span class="info-value">${escapeHtml(d.file)}</span></div>`;
            }
            if (d.startLine) {
                html += `<div class="info-row"><span class="info-label">Lines</span><span class="info-value">${d.startLine}${d.endLine && d.endLine !== d.startLine ? '-' + d.endLine : ''}</span></div>`;
            }
            if (d.metrics) {
                html += `<div class="info-row"><span class="info-label">Metrics</span><span class="info-value">LOC:${d.metrics.loc} | Params:${d.metrics.params} | Nest:${d.metrics.maxNesting}</span></div>`;
            }
            if (d.signature) {
                const params = d.signature.params ? d.signature.params.map(p => p.name + (p.type ? ':' + p.type : '')).join(', ') : '';
                const ret = d.signature.returnType ? ' => ' + d.signature.returnType : '';
                html += `<div class="info-row"><span class="info-label">Signature</span><span class="info-value">(${params})${ret}</span></div>`;
            }
            if (d.docstring) {
                html += `<div class="info-row" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="info-label">Doc</span><span class="info-value nowrap">${escapeHtml(d.docstring)}</span></div>`;
            }
            if (d.imports && d.imports.length > 0) {
                const impPaths = d.imports.map(i => i.path).slice(0, 3).join(', ');
                html += `<div class="info-row"><span class="info-label">Imports</span><span class="info-value">${impPaths}${d.imports.length > 3 ? '...' : ''}</span></div>`;
            }
            if (d.exports && d.exports.length > 0) {
                html += `<div class="info-row"><span class="info-label">Exports</span><span class="info-value">${d.exports.map(e => e.name).join(', ')}</span></div>`;
            }
            if (d.calls && d.calls.length > 0) {
                html += `<div class="info-row"><span class="info-label">Calls</span><span class="info-value">${d.calls.join(', ')}</span></div>`;
            }
            if (d.extends && d.extends.length > 0) {
                html += `<div class="info-row"><span class="info-label">Extends</span><span class="info-value">${d.extends.join(', ')}</span></div>`;
            }
            if (d.implements && d.implements.length > 0) {
                html += `<div class="info-row"><span class="info-label">Implements</span><span class="info-value">${d.implements.join(', ')}</span></div>`;
            }

            if (relatedNodes.length > 0) {
                html += `<div class="related-section"><h4>Related (${relatedNodes.length})</h4><div class="related-list">`;
                relatedNodes.forEach(({ node, rel, direction }) => {
                    const nodeColor = config.getColor(node.group);
                    const arrow = direction === 'out' ? '→' : '←';
                    html += `<div class="related-item" data-id="${node.id}">
                        <div class="dot" style="background:${nodeColor}"></div>
                        <span class="name">${escapeHtml(truncateName(node.name))}</span>
                        <span class="rel">${arrow} ${rel || ''}</span>
                    </div>`;
                });
                html += `</div></div>`;
            }

            content.innerHTML = html;

            content.querySelectorAll('.related-item').forEach(item => {
                item.addEventListener('click', () => {
                    const targetNode = graphData.nodes.find(n => n.id === item.dataset.id);
                    if (targetNode) {
                        handleClick({ target: item }, targetNode);
                        svg.transition().duration(500).call(zoom.transform,
                            d3.zoomIdentity.translate(width / 2 - targetNode.x, height / 2 - targetNode.y).scale(1.5));
                    }
                });
            });

            if (d.file) {
                jumpBtn.style.display = 'flex';
                const pathToCopy = d.startLine ? `${d.file}#L${d.startLine}` : d.file;
                jumpBtn.onclick = async () => {
                    await navigator.clipboard.writeText(pathToCopy);
                    jumpBtn.title = 'Copied!';
                    setTimeout(() => jumpBtn.title = 'Copy file path', 1500);
                };
            } else {
                jumpBtn.style.display = 'none';
            }

            const containerRect = document.getElementById('container').getBoundingClientRect();
            let left = (d.x || width / 2) + 30;
            let top = (d.y || height / 2) - 100;
            if (left + 350 > containerRect.width) left = (d.x || width / 2) - 370;
            if (top + 400 > containerRect.height) top = containerRect.height - 420;
            if (top < 20) top = 20;
            if (left < 20) left = 20;

            info.style.left = left + 'px';
            info.style.top = top + 'px';
            info.classList.add('visible');

            if (selectedNode && selectedNode.id !== d.id) {
                node.filter(n => n.id === selectedNode.id).classed('selected', false);
            }
            selectedNode = d;
            node.filter(n => n.id === d.id).classed('selected', true);
        }

        function clearSelection() {
            if (selectedNode) {
                node.filter(n => n.id === selectedNode.id).classed('selected', false);
                selectedNode = null;
            }
            document.getElementById('info').classList.remove('visible');
        }

        function handleSearch(event) {
            const query = event.target.value;
            showSearchSuggestions(query);
            if (!query) { resetView(); return; }

            clearSelection();

            const matches = graphData.nodes.filter(n => n.name.toLowerCase().includes(query.toLowerCase()));
            if (matches.length > 0) {
                const first = matches[0];
                svg.transition().duration(750).call(zoom.transform,
                    d3.zoomIdentity.translate(width / 2 - first.x, height / 2 - first.y).scale(1.5));
                highlightNodes(matches);
            }
        }

        function resetView() {
            document.getElementById('search').value = '';
            document.getElementById('info').classList.remove('visible');
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
            node.selectAll('circle').attr('opacity', 1);
            node.selectAll('text').attr('opacity', 0.8);
            link.attr('opacity', 1);
            if (selectedNode) {
                node.filter(n => n.id === selectedNode.id).classed('selected', false);
                selectedNode = null;
            }
        }

        function initDragging() {
            const info = document.getElementById('info');
            const handle = info.querySelector('.drag-handle');
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            handle.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = parseInt(info.style.left || 0);
                initialTop = parseInt(info.style.top || 0);
                info.classList.add('dragging');
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                info.style.left = (initialLeft + dx) + 'px';
                info.style.top = (initialTop + dy) + 'px';
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                info.classList.remove('dragging');
            });
        }

        function populateSearchSuggestions() { }

        function showSearchSuggestions(query) {
            const container = document.getElementById('search-suggestions');
            container.innerHTML = '';
            if (!query) {
                container.classList.remove('visible');
                return;
            }
            const matches = graphData.nodes
                .filter(n => n.name.toLowerCase().includes(query.toLowerCase()))
                .slice(0, 10);
            if (matches.length === 0) {
                container.classList.remove('visible');
                return;
            }
            matches.forEach(n => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerHTML = `${escapeHtml(truncateName(n.name))}<span class="suggestion-type">${n.group}</span>`;
                item.addEventListener('click', () => selectSearchResult(n));
                container.appendChild(item);
            });
            container.classList.add('visible');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function selectSearchResult(node) {
            document.getElementById('search').value = node.name;
            document.getElementById('search-suggestions').classList.remove('visible');
            highlightNodes([node]);
            svg.transition().duration(750).call(zoom.transform,
                d3.zoomIdentity.translate(width / 2 - node.x, height / 2 - node.y).scale(1.5));
            handleClick({ target: null }, node);
        }

        function highlightNodes(matches) {
            node.selectAll('circle').attr('opacity', n => matches.some(m => m.id === n.id) ? 1 : 0.2);
            node.selectAll('text').attr('opacity', n => matches.some(m => m.id === n.id) ? 1 : 0.1);
        }

        window.addEventListener('resize', () => {
            width = document.getElementById('container').clientWidth;
            height = document.getElementById('container').clientHeight;
            svg.attr('width', width).attr('height', height);
            simulation.force('center', d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        async function bootstrap() {
            await loadGraph();
        }

        bootstrap();
    </script>
</body>

</html>
