[package]
name = "ultragraph-kb"
version = "0.1.0"
edition = "2021"
authors = ["Aldrick Wan"]
description = "High-Performance Knowledge Base Indexer"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "ug"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"

[dependencies]
napi = { version = "3", features = ["napi6"] }
napi-build = "1"
napi-derive = "3"
rayon = "1.10"
ignore = "0.4"
blake3 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tree-sitter = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-python = "0.20"
petgraph = "0.6"
regex = "1"

[build-dependencies]
napi-build = "1"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"