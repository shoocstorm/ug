name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_name: macos-arm64
            archive: tar.gz
          - os: macos-15-intel
            asset_name: macos-x64
            archive: tar.gz
          - os: ubuntu-latest
            asset_name: linux-x64
            archive: tar.gz
          - os: windows-latest
            asset_name: windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            native/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install native build dependencies
        run: npm ci
        working-directory: native

      - name: Build
        run: npm run build

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -C .ug -czf ultragraph-${{ matrix.asset_name }}.tar.gz .

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path .ug/* -DestinationPath ultragraph-${{ matrix.asset_name }}.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ultragraph-${{ matrix.asset_name }}.${{ matrix.archive }}
          generate_release_notes: true
          fail_on_unmatched_files: true
